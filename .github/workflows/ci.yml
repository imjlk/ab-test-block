name: CI

permissions:
    contents: read

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    workflow_dispatch:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: '24'
    BUN_VERSION: '1.3.10'
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
    validate:
        name: Validate
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}

            - name: Cache Bun install cache
              uses: actions/cache@v5
              with:
                  path: ~/.bun/install/cache
                  key: bun-install-${{ runner.os }}-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      bun-install-${{ runner.os }}-${{ env.BUN_VERSION }}-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Validate Playground blueprints
              run: |
                  node <<'EOF'
                  const fs = require('node:fs');

                  for (const file of [
                    '.wordpress-org/blueprints/blueprint.json',
                    '.wordpress-org/blueprints/github-blueprint.json',
                  ]) {
                    JSON.parse(fs.readFileSync(file, 'utf8'));
                  }
                  EOF

            - name: Check version consistency
              run: |
                  node <<'EOF'
                  const fs = require('node:fs');

                  const packageVersion = JSON.parse(
                    fs.readFileSync('package.json', 'utf8')
                  ).version;
                  const pluginVersion = fs
                    .readFileSync('ab-test-block.php', 'utf8')
                    .match(/^ \* Version:\s*(.+)$/m)?.[1]
                    ?.trim();
                  const stableTag = fs
                    .readFileSync('readme.txt', 'utf8')
                    .match(/^Stable tag:\s*(.+)$/m)?.[1]
                    ?.trim();

                  if (
                    !packageVersion ||
                    packageVersion !== pluginVersion ||
                    packageVersion !== stableTag
                  ) {
                    console.error({
                      packageVersion,
                      pluginVersion,
                      stableTag,
                    });
                    process.exit(1);
                  }
                  EOF

            - name: Run lint
              run: bun run lint

            - name: Run type check
              run: bun run typecheck

            - name: Build plugin
              run: bun run build

    wp-env-smoke:
        name: WordPress Smoke
        runs-on: ubuntu-latest
        needs: validate
        timeout-minutes: 20
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}

            - name: Cache Bun install cache
              uses: actions/cache@v5
              with:
                  path: ~/.bun/install/cache
                  key: bun-install-${{ runner.os }}-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      bun-install-${{ runner.os }}-${{ env.BUN_VERSION }}-

            - name: Cache wp-env home
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.wp-env
                      ~/wp-env
                  key: wp-env-${{ runner.os }}-${{ hashFiles('.wp-env.json', 'package.json', 'bun.lock') }}
                  restore-keys: |
                      wp-env-${{ runner.os }}-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Start WordPress
              run: |
                  bun run env:stop || true
                  bun run env:start

            - name: Verify plugin activation and routes
              shell: bash
              run: |
                  set -euo pipefail

                  if ! ./node_modules/.bin/wp-env run cli wp core is-installed; then
                    ./node_modules/.bin/wp-env run cli wp core install \
                      --url=http://localhost:8890 \
                      --title="A/B Test Block" \
                      --admin_user=admin \
                      --admin_password=password \
                      --admin_email=admin@example.com
                  fi

                  ./node_modules/.bin/wp-env run cli wp plugin activate ab-test-block
                  ./node_modules/.bin/wp-env run cli wp plugin is-active ab-test-block

                  routes="$(
                    ./node_modules/.bin/wp-env run cli wp eval \
                      'echo implode(PHP_EOL, array_keys( rest_get_server()->get_routes() ));'
                  )"
                  grep -qx '/abtest-block/v1/event' <<< "${routes}"
                  grep -qx '/abtest-block/v1/reevaluate' <<< "${routes}"

                  curl --fail --silent --show-error http://localhost:8890/wp-login.php > /dev/null

            - name: Stop WordPress
              if: always()
              continue-on-error: true
              run: bun run env:stop

    package:
        name: Package Plugin
        runs-on: ubuntu-latest
        needs: validate
        timeout-minutes: 20
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}

            - name: Cache Bun install cache
              uses: actions/cache@v5
              with:
                  path: ~/.bun/install/cache
                  key: bun-install-${{ runner.os }}-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      bun-install-${{ runner.os }}-${{ env.BUN_VERSION }}-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build release zip
              run: bun run plugin-zip

            - name: Upload plugin artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ab-test-block-zip
                  path: ab-test-block.zip
                  retention-days: 7
