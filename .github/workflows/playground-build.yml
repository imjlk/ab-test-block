name: Playground Build

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: write

concurrency:
    group: playground-build-${{ github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: '24'
    BUN_VERSION: '1.3.10'
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    PLAYGROUND_BRANCH: playground-build

jobs:
    publish:
        name: Publish playground build branch
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}

            - name: Cache Bun install cache
              uses: actions/cache@v5
              with:
                  path: ~/.bun/install/cache
                  key: bun-install-${{ runner.os }}-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      bun-install-${{ runner.os }}-${{ env.BUN_VERSION }}-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build plugin zip
              run: bun run plugin-zip

            - name: Sync playground blueprints for generated branch
              run: |
                  bun run playground:sync -- \
                    --branch="${PLAYGROUND_BRANCH}" \
                    --plugin-zip-url="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${PLAYGROUND_BRANCH}/ab-test-block.zip"

            - name: Prepare generated branch contents
              shell: bash
              run: |
                  set -euo pipefail

                  out_dir="$(mktemp -d)"
                  mkdir -p "${out_dir}/.wordpress-org/blueprints"

                  cp ab-test-block.zip "${out_dir}/ab-test-block.zip"
                  cp .wordpress-org/blueprints/github-blueprint.json "${out_dir}/.wordpress-org/blueprints/github-blueprint.json"
                  cp .wordpress-org/blueprints/blueprint.json "${out_dir}/.wordpress-org/blueprints/blueprint.json"
                  cp .wordpress-org/blueprints/demo-post-content.html "${out_dir}/.wordpress-org/blueprints/demo-post-content.html"
                  printf 'Generated from %s\n' "${GITHUB_SHA}" > "${out_dir}/README.md"

                  cd "${out_dir}"
                  git init -b "${PLAYGROUND_BRANCH}"
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add .
                  git commit -m "Update playground build for ${GITHUB_SHA}"
                  git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
                  git push --force origin "${PLAYGROUND_BRANCH}"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
