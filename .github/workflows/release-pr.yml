name: Release PR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-pr
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  BUN_VERSION: "1.3.10"
  SAMPO_VERSION: "0.17.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-release-pr:
    name: Update release PR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Bun install cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-${{ env.BUN_VERSION }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Sampo
        run: cargo install sampo --locked --version ${{ env.SAMPO_VERSION }}

      - name: Prepare release changes
        id: prepare
        shell: bash
        run: |
          set +e
          sampo release
          status=$?
          set -e

          if [ "$status" -eq 2 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi

          bun run release:sync-version-files

          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create or update release PR
        if: steps.prepare.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/sampo
          base: main
          title: "release: prepare plugin release"
          commit-message: "release: prepare plugin release"
          body: |
            Automated release PR generated from the latest `main` changes.

            - consumes pending `.sampo/changesets/*`
            - bumps the plugin package version and changelog
            - syncs the WordPress plugin header and readme stable tag

            Merge this PR before tagging a release or wiring in WordPress.org SVN deployment.
          labels: |
            release
          add-paths: |
            .sampo/**
            CHANGELOG.md
            package.json
            ab-test-block.php
            readme.txt
            src/blocks/test/block.json
            src/blocks/variant/block.json
