name: Release Plugin

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  BUN_VERSION: "1.3.10"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-${{ env.BUN_VERSION }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check tag matches plugin version
        shell: bash
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          plugin_version="$(sed -n 's/^ \\* Version:[[:space:]]*//p' ab-test-block.php | head -n1 | tr -d '\r')"
          stable_tag="$(sed -n 's/^Stable tag:[[:space:]]*//p' readme.txt | head -n1 | tr -d '\r')"

          [[ "${tag_version}" == "${package_version}" ]]
          [[ "${plugin_version}" == "${package_version}" ]]
          [[ "${stable_tag}" == "${package_version}" ]]

      - name: Build release zip
        run: bun run plugin-zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ab-test-block.zip
          generate_release_notes: true
