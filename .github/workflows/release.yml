name: Release Plugin

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  BUN_VERSION: "1.3.10"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-${{ env.BUN_VERSION }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check tag matches plugin version
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const tagVersion = process.env.GITHUB_REF_NAME.replace(/^v/, '');
          const packageVersion = JSON.parse(
            fs.readFileSync('package.json', 'utf8')
          ).version;
          const pluginVersion = fs
            .readFileSync('ab-test-block.php', 'utf8')
            .match(/^ \* Version:\s*(.+)$/m)?.[1]
            ?.trim();
          const stableTag = fs
            .readFileSync('readme.txt', 'utf8')
            .match(/^Stable tag:\s*(.+)$/m)?.[1]
            ?.trim();

          if (
            tagVersion !== packageVersion ||
            pluginVersion !== packageVersion ||
            stableTag !== packageVersion
          ) {
            console.error({
              tagVersion,
              packageVersion,
              pluginVersion,
              stableTag,
            });
            process.exit(1);
          }
          EOF

      - name: Build release zip
        run: bun run plugin-zip

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" ab-test-block.zip --clobber
            exit 0
          fi

          gh release create "${tag}" \
            ab-test-block.zip \
            --generate-notes \
            --title "${tag}"
